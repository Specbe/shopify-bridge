services:
  - type: web
    name: shopify-bridge
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: PORT
        value: 10000
      - key: SHOPIFY_STORE_DOMAIN
        value: atelier-box.myshopify.com
      - key: SHOPIFY_API_VERSION
        value: 2024-01
      - key: REQUEST_TIMEOUT_MS
        value: 15000
      - key: BRIDGE_ALLOWED_ORIGINS
        value: https://admin.shopify.com,https://tyreready.com.au,https://www.tyreready.com.au
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: BRIDGE_API_KEY
        sync: false
